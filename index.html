<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AI 전화 대리인</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f9;--surface:#fff;--border:#e2e6ef;
  --text:#1a1d2e;--muted:#6b7280;
  --blue:#185FA5;--blue-l:#e6f1fb;
  --green:#059669;--green-l:#d1fae5;
  --red:#dc2626;--red-l:#fee2e2;
  --amber:#d97706;--amber-l:#fef3c7;
  --r:12px;--rs:8px;
}
body{font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#wrap{max-width:460px;margin:0 auto;padding-bottom:2rem}

/* ── 헤더 ── */
header{display:flex;justify-content:space-between;align-items:center;padding:.9rem 1.2rem;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
.logo{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700}
.logo span:first-child{font-size:22px}
#ws-dot{font-size:11px;color:var(--muted)}
#ws-dot.on{color:var(--green)}
#cfg-btn{font-size:20px;background:none;border:none;cursor:pointer;padding:4px}

/* ── 설정 패널 ── */
#cfg-panel{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 1.2rem;display:none}
#cfg-panel.open{display:block}
#cfg-panel h3{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--muted)}
.cfg-row{margin-bottom:8px}
.cfg-row label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px}
.cfg-row input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;color:var(--text);background:var(--bg)}
.cfg-row input:focus{outline:none;border-color:var(--blue)}
.cfg-save{width:100%;padding:9px;background:var(--blue);color:#fff;border:none;border-radius:var(--rs);font-size:13px;cursor:pointer;margin-top:4px}
.cfg-status{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.cs{font-size:11px;padding:3px 8px;border-radius:10px;background:var(--red-l);color:var(--red)}
.cs.ok{background:var(--green-l);color:var(--green)}

/* ── 카드 ── */
main{padding:1rem;display:flex;flex-direction:column;gap:.9rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem}
.card h2{font-size:15px;font-weight:600;margin-bottom:5px}
.hint{font-size:12px;color:var(--muted);margin-bottom:1rem}
.hidden{display:none!important}

/* ── 음성 입력 ── */
.voice-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin:1rem 0}
.mic-btn{width:76px;height:76px;border-radius:50%;border:2px solid var(--border);background:var(--surface);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:.2s}
.mic-btn:hover{border-color:var(--blue)}
.mic-btn.active{background:var(--blue);border-color:var(--blue)}
.mic-btn.active .ml{color:#fff}
.mi{font-size:26px}
.ml{font-size:11px;color:var(--muted);font-weight:500}
.vvis{display:flex;align-items:center;gap:3px;height:28px;opacity:0;transition:.3s}
.vvis.on{opacity:1}
.vb{width:4px;border-radius:2px;background:var(--blue);animation:vw .7s infinite ease-in-out}
.vb:nth-child(1){height:7px;animation-delay:0s}.vb:nth-child(2){height:16px;animation-delay:.1s}
.vb:nth-child(3){height:24px;animation-delay:.2s}.vb:nth-child(4){height:14px;animation-delay:.1s}
.vb:nth-child(5){height:9px;animation-delay:.05s}
@keyframes vw{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}
.or{text-align:center;font-size:12px;color:var(--muted);position:relative;margin:.4rem 0}
.or::before,.or::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:var(--border)}
.or::before{left:0}.or::after{right:0}
.ti-row{display:flex;gap:8px}
.ti-row input{flex:1;padding:9px 11px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;color:var(--text);background:var(--bg);outline:none}
.ti-row input:focus{border-color:var(--blue)}
.ti-row button,.btn-p,.btn-s,.btn-d{padding:9px 16px;border-radius:var(--rs);font-size:13px;cursor:pointer;font-weight:500;border:none}
.ti-row button,.btn-p{background:var(--blue);color:#fff;flex-shrink:0}
.btn-s{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-d{background:var(--red-l);color:var(--red);border:1px solid var(--red)}
.brow{display:flex;gap:8px;margin-top:1rem}
.brow>*{flex:1}

/* ── 의도 결과 ── */
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:.9rem 0}
.ii{background:var(--bg);border-radius:var(--rs);padding:9px 11px}
.ii .lb{display:block;font-size:11px;color:var(--muted);margin-bottom:2px}
.ii .vl{font-size:14px;font-weight:600}
.ir{font-size:12px;color:var(--muted);background:var(--blue-l);border-radius:var(--rs);padding:8px 11px;margin-bottom:.2rem}

/* ── 통화 화면 ── */
.ch{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:11px;border-bottom:1px solid var(--border);margin-bottom:10px}
.ci-name{font-size:17px;font-weight:700}
.ci-phone{font-size:13px;color:var(--muted);margin-top:2px}
.ct{font-size:22px;font-weight:700;color:var(--blue);text-align:right}
.cp{font-size:11px;text-align:right;padding:2px 8px;border-radius:10px;background:var(--amber-l);color:var(--amber);display:inline-block;margin-top:3px}
.cp.conn{background:var(--green-l);color:var(--green)}
.cp.agent{background:var(--blue-l);color:var(--blue);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}

.clog{max-height:270px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.le{display:flex;gap:7px;font-size:12px;align-items:flex-start}
.le .li{flex-shrink:0;font-size:14px}
.le .lm{flex:1;line-height:1.55}
.le .lt{flex-shrink:0;color:var(--muted);font-size:10px;margin-top:2px}
.le.ai .lm{color:var(--blue);font-weight:500}
.le.agent .lm{color:var(--green);font-weight:500}
.le.system .lm{color:var(--muted)}

.aa{display:flex;gap:11px;align-items:center;background:var(--green-l);border:1.5px solid var(--green);border-radius:var(--rs);padding:11px 13px;margin-bottom:10px;animation:pulse 1s infinite}
.aa-icon{font-size:22px;flex-shrink:0}
.aa-txt strong{display:block;font-size:14px;color:var(--green)}
.aa-txt span{font-size:12px;color:#065f46}

/* ── 결과 ── */
.rb{font-size:14px;line-height:1.8;background:var(--bg);border-radius:var(--rs);padding:11px;margin:.9rem 0}
.rls{max-height:150px;overflow-y:auto;margin-bottom:1rem}

/* ── 빠른 실행 ── */
.qs h3{font-size:12px;color:var(--muted);margin-bottom:9px;padding:0 .1rem}
.qg{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.qi{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:9px 6px;text-align:center;cursor:pointer;transition:.15s}
.qi:hover{border-color:var(--blue);background:var(--blue-l)}
.qi-ic{font-size:18px;margin-bottom:3px}
.qi-nm{font-size:11px;font-weight:600}
.qi-sv{font-size:10px;color:var(--muted);margin-top:1px}
</style>
</head>
<body>
<div id="wrap">

<header>
  <div class="logo"><span>📞</span><span>AI 전화 대리인</span></div>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="ws-dot">● 연결 중</span>
    <button id="cfg-btn" onclick="toggleCfg()" title="설정">⚙️</button>
  </div>
</header>

<!-- 설정 패널 -->
<div id="cfg-panel">
  <h3>⚙️ API 설정 (최초 1회)</h3>
  <div class="cfg-row"><label>Twilio Account SID</label><input id="c-sid" type="password" placeholder="ACxxxxxxxxxxxxxxxx"/></div>
  <div class="cfg-row"><label>Twilio Auth Token</label><input id="c-token" type="password" placeholder="Auth Token"/></div>
  <div class="cfg-row"><label>Twilio 전화번호 (예: +821012345678)</label><input id="c-phone" placeholder="+82..."/></div>
  <div class="cfg-row"><label>Anthropic API Key</label><input id="c-ant" type="password" placeholder="sk-ant-..."/></div>
  <div class="cfg-row"><label>이 서버의 외부 URL (Render 배포 후 자동 입력됨)</label><input id="c-url" placeholder="https://xxxx.onrender.com"/></div>
  <button class="cfg-save" onclick="saveConfig()">저장</button>
  <div class="cfg-status" id="cfg-status"></div>
</div>

<main>

  <!-- 입력 -->
  <section class="card" id="s-input">
    <h2>무엇을 도와드릴까요?</h2>
    <p class="hint">예: "신한은행에 전화해서 잔액 조회해줘"</p>
    <div class="voice-wrap">
      <button class="mic-btn" id="mic-btn" onclick="toggleMic()">
        <span class="mi">🎤</span><span class="ml" id="mic-lbl">말하기</span>
      </button>
      <div class="vvis" id="vvis">
        <div class="vb"></div><div class="vb"></div><div class="vb"></div><div class="vb"></div><div class="vb"></div>
      </div>
    </div>
    <div class="or">또는 직접 입력</div>
    <div class="ti-row">
      <input type="text" id="ti" placeholder="예: 국민은행 거래내역 조회"/>
      <button onclick="doAnalyze()">분석</button>
    </div>
  </section>

  <!-- 분석 결과 -->
  <section class="card hidden" id="s-intent">
    <h2>📋 분석 결과</h2>
    <div class="ig">
      <div class="ii"><span class="lb">기관</span><span class="vl" id="i-inst">-</span></div>
      <div class="ii"><span class="lb">서비스</span><span class="vl" id="i-svc">-</span></div>
      <div class="ii"><span class="lb">전화번호</span><span class="vl" id="i-phone">-</span></div>
      <div class="ii"><span class="lb">ARS 경로</span><span class="vl" id="i-dtmf">-</span></div>
    </div>
    <div class="ir" id="i-reason"></div>
    <div class="brow">
      <button class="btn-p" onclick="doCall()">📞 전화 걸기</button>
      <button class="btn-s" onclick="reset()">다시 입력</button>
    </div>
  </section>

  <!-- 통화 중 -->
  <section class="card hidden" id="s-call">
    <div class="ch">
      <div><div class="ci-name" id="c-inst">-</div><div class="ci-phone" id="c-num">-</div></div>
      <div><div class="ct" id="c-timer">00:00</div><div class="cp" id="c-phase">연결 중</div></div>
    </div>
    <div class="clog" id="clog"></div>
    <div class="aa hidden" id="aa">
      <div class="aa-icon">🔔</div>
      <div class="aa-txt"><strong>상담원 연결됨!</strong><span>지금 전화기를 드세요</span></div>
    </div>
    <div class="brow"><button class="btn-d" onclick="doHangup()">✕ 통화 종료</button></div>
  </section>

  <!-- 결과 -->
  <section class="card hidden" id="s-result">
    <h2 id="r-title">완료</h2>
    <div class="rb" id="r-body"></div>
    <div class="rls" id="r-log"></div>
    <button class="btn-p" onclick="reset()" style="width:100%">새 전화 걸기</button>
  </section>

  <!-- 빠른 실행 -->
  <div class="qs">
    <h3>자주 쓰는 서비스</h3>
    <div class="qg" id="qg"></div>
  </div>

</main>
</div>

<script>
const S = { sid:'sess_'+Date.now(), ws:null, recog:null, micOn:false, timer:null, sec:0, callId:null, intent:null, clog:[] };

// ── WebSocket ──────────────────────────────────────────────
function wsConnect(){
  const proto = location.protocol==='https:'?'wss':'ws';
  S.ws = new WebSocket(`${proto}://${location.host}/?session=${S.sid}`);
  S.ws.onopen = () => { dot('● 연결됨', true); };
  S.ws.onclose = () => { dot('● 끊김', false); setTimeout(wsConnect,2000); };
  S.ws.onmessage = e => onMsg(JSON.parse(e.data));
}
function dot(t,on){ const d=document.getElementById('ws-dot'); d.textContent=t; d.className=on?'on':''; }

function onMsg(d){
  switch(d.type){
    case 'call_started': show('call'); startTimer(); break;
    case 'call_connected': setPhase('ARS 대기',false); addLog('system','📞',d.message); break;
    case 'ars_speech': addLog('ars','🔊',d.message); break;
    case 'ai_action': addLog('ai','🤖',d.message); break;
    case 'agent_connecting': setPhase('상담원 연결 중',false); addLog('system','⏳',d.message); break;
    case 'agent_connected': case 'need_agent':
      setPhase('상담원 연결됨',true);
      addLog('agent','👤','상담원 연결됨 — 전화기를 드세요!');
      document.getElementById('aa').classList.remove('hidden');
      beep(); break;
    case 'service_done': stopTimer(); addLog('system','✅',d.message); setTimeout(()=>showResult('✅ 완료',d.message),1200); break;
    case 'call_ended': stopTimer(); showResult('📋 통화 종료', d.message); break;
    case 'call_busy': stopTimer(); showResult('📵 통화 중','해당 번호가 통화 중입니다.'); break;
    case 'call_noanswer': stopTimer(); showResult('📵 응답 없음','전화를 받지 않았습니다.'); break;
    case 'call_failed': stopTimer(); showResult('❌ 실패',d.message||'전화 연결 실패'); break;
  }
}

// ── 설정 ──────────────────────────────────────────────────
function toggleCfg(){ document.getElementById('cfg-panel').classList.toggle('open'); checkConfig(); }

async function saveConfig(){
  const body = {
    twilioSid: document.getElementById('c-sid').value,
    twilioToken: document.getElementById('c-token').value,
    twilioPhone: document.getElementById('c-phone').value,
    anthropicKey: document.getElementById('c-ant').value,
    baseUrl: document.getElementById('c-url').value || location.origin
  };
  await fetch('/api/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  checkConfig();
}

async function checkConfig(){
  try {
    const r = await fetch('/api/config-status');
    const d = await r.json();
    const el = document.getElementById('cfg-status');
    el.innerHTML = `
      <span class="cs ${d.twilio?'ok':''}">Twilio: ${d.twilio?'✓ 설정됨':'✗ 미설정'}</span>
      <span class="cs ${d.anthropic?'ok':''}">Claude: ${d.anthropic?'✓ 설정됨':'✗ 미설정'}</span>
      <span class="cs ${d.baseUrl?'ok':''}">URL: ${d.baseUrl?'✓ 설정됨':'✗ 미설정'}</span>
    `;
  } catch(e){}
}

// ── 음성 인식 ─────────────────────────────────────────────
function initRecog(){
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return null;
  const r = new SR(); r.lang='ko-KR'; r.continuous=false; r.interimResults=false;
  r.onresult = e => { document.getElementById('ti').value=e.results[0][0].transcript; stopMic(); doAnalyze(); };
  r.onerror = () => stopMic();
  r.onend = () => { if(S.micOn) stopMic(); };
  return r;
}
function toggleMic(){ S.micOn ? stopMic() : startMic(); }
function startMic(){
  if(!S.recog) S.recog=initRecog();
  if(!S.recog){alert('음성인식 미지원 브라우저입니다.');return;}
  try{ S.recog.start(); S.micOn=true;
    document.getElementById('mic-btn').classList.add('active');
    document.getElementById('mic-lbl').textContent='듣는 중...';
    document.getElementById('vvis').classList.add('on');
  }catch(e){}
}
function stopMic(){
  S.micOn=false; try{S.recog&&S.recog.stop();}catch(e){}
  document.getElementById('mic-btn').classList.remove('active');
  document.getElementById('mic-lbl').textContent='말하기';
  document.getElementById('vvis').classList.remove('on');
}

// ── 의도 분석 ─────────────────────────────────────────────
async function doAnalyze(){
  const text = document.getElementById('ti').value.trim();
  if(!text) return;
  document.getElementById('ti').value='분석 중...';
  document.getElementById('ti').disabled=true;
  try{
    const r = await fetch('/api/intent',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
    const d = await r.json();
    document.getElementById('ti').disabled=false;
    document.getElementById('ti').value=text;
    if(!r.ok){ alert('분석 실패: '+(d.error||'오류')); return; }
    S.intent=d;
    document.getElementById('i-inst').textContent=d.institution.name;
    document.getElementById('i-svc').textContent=d.service||'일반 문의';
    document.getElementById('i-phone').textContent=d.institution.phone;
    document.getElementById('i-dtmf').textContent=d.dtmfSequence?.join(' → ')||'자동';
    document.getElementById('i-reason').textContent='💡 '+d.reason;
    show('intent');
  }catch(e){ document.getElementById('ti').disabled=false; alert('서버 오류: '+e.message); }
}

// ── 전화 발신 ─────────────────────────────────────────────
async function doCall(){
  if(!S.intent) return;
  const {institution,service,dtmfSequence}=S.intent;
  document.getElementById('c-inst').textContent=institution.name;
  document.getElementById('c-num').textContent=institution.phone;
  S.clog=[];
  try{
    const r = await fetch('/api/call/start',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({phone:institution.phone,institution:institution.name,service,dtmfSequence,sessionId:S.sid})});
    const d = await r.json();
    if(!r.ok){ alert('전화 실패: '+(d.error||'오류')); return; }
    S.callId=d.callId;
    addLog('system','📞',`${institution.name} 발신 중...`);
  }catch(e){ alert('오류: '+e.message); }
}

async function doHangup(){
  if(!S.callId) return;
  stopTimer();
  try{ await fetch('/api/call/hangup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({callId:S.callId})}); }catch(e){}
  showResult('통화 종료','사용자가 통화를 종료했습니다.',S.clog);
}

// ── 타이머 ────────────────────────────────────────────────
function startTimer(){
  S.sec=0; S.timer=setInterval(()=>{
    S.sec++;
    const m=String(Math.floor(S.sec/60)).padStart(2,'0'), s=String(S.sec%60).padStart(2,'0');
    const el=document.getElementById('c-timer'); if(el) el.textContent=m+':'+s;
  },1000);
}
function stopTimer(){ clearInterval(S.timer); }

// ── UI 헬퍼 ──────────────────────────────────────────────
function show(name){
  ['input','intent','call','result'].forEach(n=>{ const e=document.getElementById('s-'+n); if(e) e.classList.add('hidden'); });
  const t=document.getElementById('s-'+name); if(t) t.classList.remove('hidden');
}
function setPhase(txt,isAgent){
  const b=document.getElementById('c-phase');
  b.textContent=txt; b.className='cp'+(isAgent?' agent':' conn');
}
function addLog(type,icon,msg){
  const ts=new Date(); const t=`${String(ts.getHours()).padStart(2,'0')}:${String(ts.getMinutes()).padStart(2,'0')}:${String(ts.getSeconds()).padStart(2,'0')}`;
  S.clog.push({type,icon,msg});
  const c=document.getElementById('clog'); if(!c) return;
  const el=document.createElement('div'); el.className='le '+type;
  el.innerHTML=`<span class="li">${icon}</span><span class="lm">${msg}</span><span class="lt">${t}</span>`;
  c.appendChild(el); c.scrollTop=c.scrollHeight;
}
function showResult(title,body){
  document.getElementById('r-title').textContent=title;
  document.getElementById('r-body').textContent=body;
  const rl=document.getElementById('r-log'); rl.innerHTML='';
  S.clog.forEach(e=>{ const el=document.createElement('div'); el.className='le '+e.type;
    el.innerHTML=`<span class="li">${e.icon}</span><span class="lm">${e.msg}</span>`; rl.appendChild(el); });
  show('result');
}
function reset(){
  S.callId=null; S.intent=null; S.clog=[]; stopTimer();
  document.getElementById('ti').value='';
  document.getElementById('clog').innerHTML='';
  document.getElementById('aa').classList.add('hidden');
  show('input');
}

// ── 알림음 ───────────────────────────────────────────────
function beep(){
  try{
    const c=new(window.AudioContext||window.webkitAudioContext)();
    [0,.15,.3].forEach(d=>{ const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.frequency.value=880;o.type='sine';
      g.gain.setValueAtTime(.3,c.currentTime+d);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d+.25);
      o.start(c.currentTime+d);o.stop(c.currentTime+d+.25);
    });
  }catch(e){}
}

// ── 빠른 실행 ────────────────────────────────────────────
const QUICK=[
  {ic:'🏦',nm:'신한은행',sv:'잔액조회',q:'신한은행 잔액 조회해줘'},
  {ic:'🏦',nm:'국민은행',sv:'거래내역',q:'국민은행 거래내역 조회해줘'},
  {ic:'💳',nm:'신한카드',sv:'청구금액',q:'신한카드 이번달 청구금액 알려줘'},
  {ic:'🏥',nm:'건강보험',sv:'보험료',q:'건강보험공단 보험료 조회해줘'},
  {ic:'📱',nm:'SKT',sv:'요금조회',q:'SKT 이번달 요금 조회해줘'},
  {ic:'🏛️',nm:'국민연금',sv:'가입내역',q:'국민연금 가입내역 조회해줘'},
];
(function(){
  const g=document.getElementById('qg');
  QUICK.forEach(item=>{ const el=document.createElement('div'); el.className='qi';
    el.innerHTML=`<div class="qi-ic">${item.ic}</div><div class="qi-nm">${item.nm}</div><div class="qi-sv">${item.sv}</div>`;
    el.onclick=()=>{ document.getElementById('ti').value=item.q; doAnalyze(); };
    g.appendChild(el); });
})();

document.getElementById('ti').addEventListener('keydown',e=>{ if(e.key==='Enter') doAnalyze(); });
wsConnect();
checkConfig();
</script>
